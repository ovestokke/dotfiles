packages:
  linux:
    # Debian/Ubuntu packages (apt) - Desktop/GUI applications
    apt:
      - wezterm # GPU-accelerated terminal emulator
      - tesseract-ocr # OCR engine for screen text recognition
      - tesseract-ocr-eng # English language data for tesseract
      - tesseract-ocr-nor # Norwegian language data for tesseract

    # Arch Linux packages (pacman) - Desktop/GUI applications
    pacman:
      - wezterm # GPU-accelerated terminal emulator
      - ttf-meslo-nerd # Patched Meslo LG font from nerd fonts (includes Powerlevel10k glyphs)
      - gnome-keyring # GNOME keyring for secret/credential storage
      - tumbler # Thumbnail service for Thunar
      - thunar-archive-plugin # Archive actions in Thunar context menu
      - tesseract # OCR engine for screen text recognition
      - tesseract-data-eng # English language data for tesseract
      - tesseract-data-nor # Norwegian language data for tesseract

    # AUR packages (yay/paru) - Desktop apps not in official repos
    aur:
      - ghostty # Fast GPU-accelerated terminal emulator
      - proton-pass-bin # Proton Pass CLI for password management (pre-built binary)
      - visual-studio-code-bin # Microsoft VS Code (proprietary build with full extension support)
