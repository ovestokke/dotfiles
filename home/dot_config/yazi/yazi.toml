# Neovim-ish Yazi setup.
# Keep normal text/code previews on Yazi's built-in async previewer for speed.
# Custom shell preview is only used for .diff/.patch files; use D for nvim git diff.

[mgr]
ratio = [1, 3, 4]
sort_by = "natural"
sort_sensitive = false
sort_dir_first = true
linemode = "size"
show_symlink = true
scrolloff = 8

[preview]
wrap = "no"
tab_size = 2
max_width = 1200
max_height = 900
image_delay = 60
image_filter = "triangle"
image_quality = 75

[opener]
edit = [
  { run = "nvim %s", block = true, for = "unix", desc = "Edit in Neovim" },
]

[open]
prepend_rules = [
  { mime = "text/*", use = "edit" },
  { mime = "application/{json,ndjson,javascript,x-javascript,toml,yaml,xml,sql,wine-extension-ini}", use = "edit" },
]

[plugin]
prepend_previewers = [
  { url = "*.diff", run = 'piper -- ~/.config/yazi/scripts/preview-code "$1"' },
  { url = "*.patch", run = 'piper -- ~/.config/yazi/scripts/preview-code "$1"' },
]
