# Neovim-ish Yazi previews.
# Uses ~/.config/yazi/scripts/preview-code for bat + git-diff-aware text previews.

[mgr]
ratio = [1, 3, 4]
sort_by = "natural"
sort_sensitive = false
sort_dir_first = true
linemode = "size"
show_symlink = true
scrolloff = 8

[preview]
wrap = "no"
tab_size = 2
max_width = 2000
max_height = 1400
image_delay = 40
image_filter = "lanczos3"
image_quality = 85

[opener]
edit = [
  { run = "nvim %s", block = true, for = "unix", desc = "Edit in Neovim" },
]

[open]
prepend_rules = [
  { mime = "text/*", use = "edit" },
  { mime = "application/{json,ndjson,javascript,x-javascript,toml,yaml,xml,sql,wine-extension-ini}", use = "edit" },
]

[plugin]
prepend_previewers = [
  { url = "*/", run = 'piper -- ~/.config/yazi/scripts/preview-dir "$1"' },
  { url = "*.diff", run = 'piper -- ~/.config/yazi/scripts/preview-code "$1"' },
  { url = "*.patch", run = 'piper -- ~/.config/yazi/scripts/preview-code "$1"' },
  { mime = "text/*", run = 'piper -- ~/.config/yazi/scripts/preview-code "$1"' },
  { mime = "application/{json,ndjson,javascript,x-javascript,toml,yaml,xml,sql,wine-extension-ini}", run = 'piper -- ~/.config/yazi/scripts/preview-code "$1"' },
]
